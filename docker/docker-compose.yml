services:
    touch_device:
        image: touch
        build: ./touch.dockerfile
        container_name: touch_device
        environment:
            - DISPLAY=$DISPLAY
        volumes:
            - /tmp/.X11-unix:/tmp/.X11-unix 
            - $HOME/.Xauthority:/root/.Xauthority:rw
        network_mode: "host"

    yarp_server:
        image: yarp
        build: ./yarp.dockerfile
        container_name: yarp_server
        command: "yarpserver --write"
        network_mode: "host"

    yarp_geomagic:
        image: yarp
        build: ./yarp.dockerfile
        container_name: yarp_geomagic
        command: "yarpdev --device deviceBundler --attached_device geomagicdriver --wrapper_device hapticdevicewrapper"
        network_mode: "host"
        depends_on:
            - yarp_server
    
    yarp_geomagic_ros2:
        image: yarp
        build: ./yarp.dockerfile
        container_name: yarp_geomagic_ros2
        command: "yarpdev --device deviceBundler --attached_device geomagicdriver --wrapper_device hapticDevice_nws_ros2 --topic_name haptic_device"        
        network_mode: "host"
        depends_on:
            - yarp_server

    node_abb:
        image: ros2
        build: ./ros2.dockerfile
        container_name: node_abb
        command: ros2 run abb_egm_driver egm_driver --ros-args -p smooth_factor:=0.8
        network_mode: "host"
        depends_on:
            - yarp_geomagic_ros2
    
    node_geomagic:
        image: ros2
        build: ./ros2.dockerfile
        container_name: node_geomagic
        command: "ros2 run geomagic_control haptic_to_cartesian --ros-args -p roll_N_sensor:=-1.57 -p yow_N_sensor:=-1.57"
        network_mode: "host"
        depends_on:
            - node_abb
    
    node_jr3:
        image: ros2
        build: ./ros2.dockerfile
        container_name: node_jr3
        command: "ros2 run jr3_driver jr3_driver --ros-args -p channel:=/dev/ttyACM0"
        network_mode: "host"
        depends_on:
            - node_abb
    
    node_jr3_abb:
        image: ros2
        build: ./ros2.dockerfile
        container_name: node_jr3_abb
        volumes:
            - /dev:/dev
        command: "ros2 run geomagic_control cartesian_to_haptic"
        network_mode: "host"
        depends_on:
            - node_jr3
